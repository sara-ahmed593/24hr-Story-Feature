<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stories</title>
    <link rel="stylesheet" href="./src/css/style.css">
</head>

<body>
    <main>
        <div class="card-container">
            <h1 class="title">Stories</h1>



            <div class="stories-card">

                <div class="story-item">
                    <div class="story-circle" id="add-btn">
                        <div class="story-icon">+</div>
                        <input type="file" id="file-input" accept="image/*" hidden />
                    </div>
                    <div class="story-label">Add Story</div>

                </div>

            </div>


            <div id="story-viewer" class="story-viewer hidden">
                <div id="progress-bar-container" class="progressbar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>

                <button id="close-viewer" class="close-viewer">
                    X
                </button>
                <button id="delete-btn" class="delete-btn">
                    Delete
                </button>

                <div class="viewer-control prev-story" id="prev-story"> </div>

                <img id="viewer-image" class="viewer-image" src="" alt="Story">

                <div class="viewer-control next-story" id="next-story"> </div>
            </div>

            <section class="app-content">
                <h2>How to use</h2>

                <p>Welcome to the Stories App.</p>
                <p>Add a story using the "+" button above. Click on a story circle to view.</p>
                <p>Stories automatically disappear after 24 hours.</p>
                <p>Inside the story viewer, you can click on edges to navigate, or click the Delete Button to
                    remove.
                </p>
            </section>
        </div>




    </main>
    <script src="./src/js/script.js"></script>
</body>

</html>


<!-- 
Welcome to the Stories App!

Add a story using the "+" button above. Click on a story circle to view.

Stories automatically disappear after 24 hours.

Inside the story viewer, you can swipe or click on edges to navigate, or click the trash icon to delete. -->
